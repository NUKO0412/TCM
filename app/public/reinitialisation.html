<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Réinitialisation du mot de passe — TCM Agencement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #16140f;
        --ink-2: #1e1a13;
        --cream: #f4eddf;
        --oak: #c2904b;
        --oak-2: #d9ac63;
        --muted: #b6ab94;
        --muted-d: #6f6450;
        --line-d: rgba(244, 237, 223, 0.13);
        --serif: Fraunces, Georgia, serif;
        --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --mono: "Space Mono", monospace;
        --warn: #e0a070;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--ink);
        color: var(--cream);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        line-height: 1.6;
        padding: 40px 18px;
      }

      main {
        width: 380px;
        max-width: 100%;
        border: 1px solid var(--line-d);
        border-radius: 14px;
        background: var(--ink-2);
        padding: 34px;
      }

      .eyebrow {
        color: var(--oak-2);
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-family: var(--mono);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
      }

      .eyebrow::before {
        content: "";
        width: 34px;
        height: 1px;
        background: var(--oak);
        display: inline-block;
        opacity: 0.8;
      }

      h1 {
        margin: 14px 0 24px;
        font-family: var(--serif);
        font-size: 30px;
        font-weight: 500;
        line-height: 1.05;
        letter-spacing: -0.015em;
      }

      form {
        margin: 0;
      }

      .field {
        margin-bottom: 16px;
      }

      label {
        display: block;
        margin: 0 0 8px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        border: 1px solid var(--line-d);
        border-radius: 8px;
        background: var(--ink);
        color: var(--cream);
        font-family: var(--sans);
        font-size: 15px;
        padding: 13px 15px;
        transition:
          border-color 0.3s,
          background 0.3s;
      }

      input:focus {
        outline: none;
        border-color: var(--oak);
        background: #221d15;
      }

      .password-wrap {
        position: relative;
      }

      .password-wrap input {
        padding-right: 48px;
      }

      .password-toggle {
        position: absolute;
        top: 50%;
        right: 8px;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        margin-top: 0;
        padding: 0;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        width: 100%;
        margin-top: 8px;
        border: 0;
        border-radius: 6px;
        background: var(--oak);
        color: #17120b;
        font-size: 15px;
        font-weight: 500;
        padding: 16px 26px;
        cursor: pointer;
        transition:
          background 0.3s,
          transform 0.25s;
      }

      button:hover {
        background: var(--oak-2);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      p {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .hint {
        margin: -4px 0 16px;
        font-size: 13px;
      }

      .error {
        color: var(--warn);
        font-size: 13px;
      }

      .login-link {
        display: inline-flex;
        margin-top: 16px;
        color: var(--muted);
        font-size: 12px;
        font-family: var(--mono);
        letter-spacing: 0.04em;
        text-decoration: none;
      }

      .login-link:hover {
        color: var(--oak-2);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow">Espace administrateur</span>
      <h1 id="title">Préparation du mot de passe</h1>
      <p id="status">Vérification du lien sécurisé…</p>
      <form id="form" hidden>
        <input id="username" name="username" type="email" autocomplete="username" hidden readonly />

        <div class="field">
          <label for="new-password">Nouveau mot de passe</label>
          <div class="password-wrap">
            <input id="new-password" name="new-password" type="password" autocomplete="new-password" minlength="12" required />
            <button
              class="password-toggle"
              type="button"
              data-toggle-password="new-password"
              aria-label="Afficher le mot de passe"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" fill="none">
                <path
                  d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  class="eye-cross"
                  d="M4 4l16 16"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  hidden
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="confirm-password">Confirmer le mot de passe</label>
          <div class="password-wrap">
            <input
              id="confirm-password"
              name="confirm-password"
              type="password"
              autocomplete="new-password"
              minlength="12"
              required
            />
            <button
              class="password-toggle"
              type="button"
              data-toggle-password="confirm-password"
              aria-label="Afficher la confirmation"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" fill="none">
                <path
                  d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  class="eye-cross"
                  d="M4 4l16 16"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  hidden
                />
              </svg>
            </button>
          </div>
        </div>

        <p class="hint">Utilisez un mot de passe long. Firefox peut proposer et enregistrer un mot de passe fort sur ces champs.</p>
        <p id="error" class="error" hidden></p>
        <button id="submit" type="submit">Définir le mot de passe</button>
      </form>
      <a id="login" class="login-link" href="/connexion" hidden>← Retour à la connexion</a>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

      const title = document.getElementById("title")
      const status = document.getElementById("status")
      const form = document.getElementById("form")
      const login = document.getElementById("login")
      const errorNode = document.getElementById("error")
      const submit = document.getElementById("submit")
      const password = document.getElementById("new-password")
      const confirm = document.getElementById("confirm-password")
      const username = document.getElementById("username")
      const toggles = document.querySelectorAll("[data-toggle-password]")

      toggles.forEach((toggle) => {
        const field = document.getElementById(toggle.dataset.togglePassword)
        const cross = toggle.querySelector(".eye-cross")
        toggle.addEventListener("click", () => {
          const visible = field.type === "text"
          field.type = visible ? "password" : "text"
          toggle.setAttribute(
            "aria-label",
            visible ? "Afficher le mot de passe" : "Masquer le mot de passe",
          )
          if (cross) cross.hidden = visible
        })
      })

      function fail(message) {
        title.textContent = "Lien invalide ou expiré"
        status.textContent = message
        form.hidden = true
        login.hidden = false
      }

      function formError(message) {
        errorNode.textContent = message
        errorNode.hidden = false
      }

      try {
        const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""))
        const accessToken = hash.get("access_token")
        const refreshToken = hash.get("refresh_token")

        if (!accessToken || !refreshToken) {
          fail("Le lien de réinitialisation n’est plus valable. Demandez-en un nouveau depuis la page de connexion.")
        } else {
          const supabaseUrl = "__SUPABASE_URL__"
          const supabaseAnonKey = "__SUPABASE_ANON_KEY__"
          if (supabaseUrl.startsWith("__") || supabaseAnonKey.startsWith("__")) {
            throw new Error("Configuration Supabase indisponible.")
          }
          const supabase = createClient(supabaseUrl, supabaseAnonKey, {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false },
          })

          const { data, error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken,
          })

          if (error) throw error

          window.history.replaceState(null, "", window.location.pathname)
          title.textContent = "Nouveau mot de passe"
          status.hidden = true
          username.value = data.session?.user?.email ?? ""
          form.hidden = false
          password.focus()

          form.addEventListener("submit", async (event) => {
            event.preventDefault()
            errorNode.hidden = true

            if (password.value.length < 12) {
              formError("Le mot de passe doit faire au moins 12 caractères.")
              return
            }

            if (password.value !== confirm.value) {
              formError("Les deux mots de passe ne correspondent pas.")
              return
            }

            submit.disabled = true
            submit.textContent = "Enregistrement…"
            const { error: updateError } = await supabase.auth.updateUser({ password: password.value })

            if (updateError) {
              submit.disabled = false
              submit.textContent = "Définir le mot de passe"
              formError("La mise à jour a échoué. Réessayez ou redemandez un lien.")
              return
            }

            await supabase.auth.signOut()
            window.location.replace("/connexion?password=updated")
          })
        }
      } catch {
        fail("Impossible de préparer la réinitialisation. Demandez un nouveau lien.")
      }
    </script>
  </body>
</html>
