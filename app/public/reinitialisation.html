<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Réinitialisation du mot de passe — TCM Agencement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #151319;
        --card: #211d24;
        --line: #38313a;
        --text: #f7f2ec;
        --muted: #c9bfb5;
        --gold: #d7b46a;
        --warn: #e0a070;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--ink);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: 380px;
        max-width: calc(100vw - 36px);
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--card);
        padding: 30px;
      }

      .eyebrow {
        color: var(--gold);
        font-family: "Space Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      h1 {
        margin: 14px 0 22px;
        font-family: Fraunces, Georgia, serif;
        font-size: 30px;
        font-weight: 500;
      }

      label {
        display: block;
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 13px;
      }

      input {
        width: 100%;
        min-height: 48px;
        margin: 0 0 16px;
        border: 1px solid #4a414a;
        border-radius: 8px;
        background: #151319;
        color: #fff;
        font-size: 16px;
        padding: 12px;
      }

      button,
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        background: var(--gold);
        color: #17120b;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      p {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .hint {
        margin: -4px 0 16px;
        font-size: 13px;
      }

      .error {
        color: var(--warn);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow">Espace administrateur</span>
      <h1 id="title">Préparation du mot de passe</h1>
      <p id="status">Vérification du lien sécurisé…</p>
      <form id="form" hidden>
        <input id="username" name="username" type="email" autocomplete="username" hidden readonly />

        <label for="new-password">Nouveau mot de passe</label>
        <input id="new-password" name="new-password" type="password" autocomplete="new-password" minlength="12" required />

        <label for="confirm-password">Confirmer le mot de passe</label>
        <input
          id="confirm-password"
          name="confirm-password"
          type="password"
          autocomplete="new-password"
          minlength="12"
          required
        />

        <p class="hint">Utilisez un mot de passe long. Firefox peut proposer et enregistrer un mot de passe fort sur ces champs.</p>
        <p id="error" class="error" hidden></p>
        <button id="submit" type="submit">Définir le mot de passe</button>
      </form>
      <a id="login" class="button" href="/connexion" hidden>Aller à la connexion</a>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

      const title = document.getElementById("title")
      const status = document.getElementById("status")
      const form = document.getElementById("form")
      const login = document.getElementById("login")
      const errorNode = document.getElementById("error")
      const submit = document.getElementById("submit")
      const password = document.getElementById("new-password")
      const confirm = document.getElementById("confirm-password")
      const username = document.getElementById("username")

      function fail(message) {
        title.textContent = "Lien invalide ou expiré"
        status.textContent = message
        form.hidden = true
        login.hidden = false
      }

      function formError(message) {
        errorNode.textContent = message
        errorNode.hidden = false
      }

      try {
        const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""))
        const accessToken = hash.get("access_token")
        const refreshToken = hash.get("refresh_token")

        if (!accessToken || !refreshToken) {
          fail("Le lien de réinitialisation n’est plus valable. Demandez-en un nouveau depuis la page de connexion.")
        } else {
          const configResponse = await fetch("/api/reset-config", { cache: "no-store" })
          if (!configResponse.ok) throw new Error("Configuration Supabase indisponible.")
          const { supabaseUrl, supabaseAnonKey } = await configResponse.json()
          const supabase = createClient(supabaseUrl, supabaseAnonKey, {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false },
          })

          const { data, error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken,
          })

          if (error) throw error

          window.history.replaceState(null, "", window.location.pathname)
          title.textContent = "Nouveau mot de passe"
          status.hidden = true
          username.value = data.session?.user?.email ?? ""
          form.hidden = false
          password.focus()

          form.addEventListener("submit", async (event) => {
            event.preventDefault()
            errorNode.hidden = true

            if (password.value.length < 12) {
              formError("Le mot de passe doit faire au moins 12 caractères.")
              return
            }

            if (password.value !== confirm.value) {
              formError("Les deux mots de passe ne correspondent pas.")
              return
            }

            submit.disabled = true
            submit.textContent = "Enregistrement…"
            const { error: updateError } = await supabase.auth.updateUser({ password: password.value })

            if (updateError) {
              submit.disabled = false
              submit.textContent = "Définir le mot de passe"
              formError("La mise à jour a échoué. Réessayez ou redemandez un lien.")
              return
            }

            await supabase.auth.signOut()
            window.location.replace("/connexion?password=updated")
          })
        }
      } catch {
        fail("Impossible de préparer la réinitialisation. Demandez un nouveau lien.")
      }
    </script>
  </body>
</html>
